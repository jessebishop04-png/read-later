services:
  read-later:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Public URL of this app (required for NextAuth and the browser extension)
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env or the shell}
      DATABASE_URL: file:/data/prod.db
    volumes:
      - read-later-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  read-later-data:
